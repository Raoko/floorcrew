<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floor Pulse — EVI01</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #070b14;
      --surface:  #0d1220;
      --border:   #1a2340;
      --muted:    #2a3a5a;
      --text:     #6080a0;
      --bright:   #8aa8cc;
      --accent:   #4da6ff;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--bright);
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    /* ── App layout ── */
    #app {
      display: flex; flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .title {
      font-size: 13px;
      letter-spacing: 6px;
      color: var(--accent);
    }

    .facility {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
    }

    .tech-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 10px 3px 7px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
    }

    .tech-badge .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tech-badge .badge-name {
      font-size: 10px;
      letter-spacing: 3px;
    }

    .conn-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; letter-spacing: 2px; color: var(--muted);
    }

    #conn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ff4444;
      transition: background 0.3s;
    }

    .sim-btn {
      padding: 5px 14px;
      background: transparent;
      border: 1px solid var(--muted);
      border-radius: 3px;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .sim-btn:hover { border-color: var(--bright); color: var(--bright); }
    .sim-btn.active { border-color: #ffd43b; color: #ffd43b; }

    /* ── Canvas ── */
    main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      padding: 8px;
    }

    #floor-canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      cursor: crosshair;
    }

    /* ── HUD ── */
    footer.hud {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      gap: 20px;
    }

    .hud-block { display: flex; flex-direction: column; gap: 3px; min-width: 90px; }
    .hud-block .label { font-size: 9px; letter-spacing: 3px; color: var(--muted); }
    .hud-block .value { font-size: 15px; letter-spacing: 2px; color: var(--bright); }

    #tap-btn {
      flex: 1; max-width: 340px;
      padding: 16px;
      background: transparent;
      border: 1px solid var(--muted);
      border-radius: 4px;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 6px;
      cursor: pointer;
      transition: all 0.12s ease;
      text-transform: uppercase;
    }

    #tap-btn:not(:disabled):hover {
      background: rgba(77, 166, 255, 0.06);
    }

    #tap-btn:not(:disabled):active {
      transform: scale(0.97);
      background: rgba(77, 166, 255, 0.12);
    }

    #tap-btn:disabled { opacity: 0.3; cursor: default; }

    .hud-block.right { text-align: right; }

    .hint {
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--muted);
      opacity: 0.5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- Main app -->
<div id="app">
  <header>
    <div class="header-left">
      <span class="title">FLOOR PULSE</span>
      <span class="facility">EVI01 — ELK GROVE</span>
      <div class="tech-badge" id="tech-badge" style="display:none">
        <span class="badge-dot" id="badge-dot"></span>
        <span class="badge-name" id="badge-name"></span>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <button class="sim-btn" id="sim-btn" onclick="toggleSimulate()">SIMULATE</button>
      <div class="conn-status">
        <span id="conn-dot"></span>
        <span id="conn-label">OFFLINE</span>
      </div>
    </div>
  </header>

  <main>
    <canvas id="floor-canvas" width="1400" height="760"></canvas>
  </main>

  <footer class="hud">
    <div class="hud-block">
      <span class="label">TECH</span>
      <span class="value" id="hud-tech">—</span>
    </div>
    <button id="tap-btn" disabled onclick="fireTap()">TASK DONE</button>
    <div class="hud-block right">
      <span class="label">RACK</span>
      <span class="value" id="hud-rack">—</span>
      <span class="hint">click floor to move</span>
    </div>
  </footer>
</div>

<script src="app.js"></script>
<script>init();</script>
</body>
</html>
